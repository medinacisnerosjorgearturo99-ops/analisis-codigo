version: '3.8'

services:
  # 1. Base de Datos
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=sonar
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persiste la BD entre reinicios
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - analisis-network

  # 2. SonarQube
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://postgres_db:5432/sonar
      - SONAR_JDBC_USERNAME=admin
      - SONAR_JDBC_PASSWORD=adminpassword
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions   # caché de analizadores de lenguaje
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 120s
    networks:
      - analisis-network

  # 3. Backend (FastAPI)
  backend:
    build: ./backend
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      sonarqube:
        condition: service_healthy
    env_file:
      - ./backend/.env
    networks:
      - analisis-network

  # 4. Frontend (Next.js)
  frontend:
    build: ./frontend
    container_name: nextjs_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - analisis-network

# Volúmenes persistentes — sobreviven a docker compose down
volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  analisis-network:
    driver: bridge