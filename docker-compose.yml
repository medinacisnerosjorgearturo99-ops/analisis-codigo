version: '3.8'

services:
  # Base de datos central (Para el backend y SonarQube)
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=adminpassword
      - POSTGRES_DB=codedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Sistema de colas para procesar análisis en segundo plano
  redis:
    image: redis:7-alpine
    container_name: redis_queue
    ports:
      - "6379:6379"

  # Motor de análisis estático
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube_server
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://db:5432/codedb
      - SONAR_JDBC_USERNAME=admin
      - SONAR_JDBC_PASSWORD=adminpassword
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      - db

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: