name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Tests del Backend (Python)
  # ─────────────────────────────────────────────
  test-backend:
    name: 🐍 Tests Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt && pip install pytest httpx

      - name: Ejecutar tests
        # ✅ FIX: entramos al backend antes de correr pytest, así encuentra main.py
        working-directory: backend
        run: pytest tests/ -v
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

  # ─────────────────────────────────────────────
  # JOB 2: Lint del Frontend (Next.js)
  # ─────────────────────────────────────────────
  lint-frontend:
    name: 🎨 Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: cd frontend && npm install

      - name: Ejecutar lint
        # ✅ FIX: next lint --no-eslint-rc evita el prompt interactivo
        run: cd frontend && npx next lint --dir app

  # ─────────────────────────────────────────────
  # JOB 3: Verificar que Docker Compose es válido
  # ─────────────────────────────────────────────
  validate-docker:
    name: 🐳 Validar Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Crear .env de prueba para CI
        # ✅ FIX: el .env no está en el repo, lo creamos antes de validar
        run: |
          mkdir -p backend
          echo "SONAR_TOKEN=dummy_token_for_ci" > backend/.env
          echo "SONAR_HOST_URL=http://sonarqube:9000" >> backend/.env

      - name: Validar sintaxis del docker-compose
        run: docker compose config